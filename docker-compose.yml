
services:
  backend:
    build: ./backend/week_2
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/week_2:/app
      - ./data:/app/data
      - ./scripts:/app/scripts
    # This chain forces the ETL script to run successfully before starting main.py
    command: sh -c "uv run python scripts/etl_pipeline.py && uv run python scripts/etl_expenditure.py && uv run python main.py"

  frontend:
    image: budget-tracker-frontend
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true


